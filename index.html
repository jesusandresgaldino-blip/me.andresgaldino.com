    <script>
        const hero = document.querySelector('.hero');
        const stickyHeader = document.getElementById('sticky-header');
        const observer = new IntersectionObserver(
            ([entry]) => {
                const visible = !entry.isIntersecting;
                stickyHeader.classList.toggle('sticky-header--visible', visible);
                stickyHeader.setAttribute('aria-hidden', !visible);
            },
            { threshold: 0 }
        );
        observer.observe(hero);

        function toggleIg() {
            document.getElementById('ig-toggle').classList.toggle('ig-open');
        }

        // ── Card scroll-reveal with stagger ──
        const cards = document.querySelectorAll('.net-card');
        let revealIndex = 0;
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    const delay = revealIndex * 55;
                    revealIndex++;
                    setTimeout(() => card.classList.add('card-revealed'), delay);
                    revealObserver.unobserve(card);
                }
            });
        }, { threshold: 0.06 });
        cards.forEach(card => {
            card.style.opacity = '0';
            revealObserver.observe(card);
        });

        // ── Portfolio reel: play on first interaction, mute toggle ──
        const reelVideo = document.getElementById('reel-video');
        const reelMuteBtn = document.getElementById('reel-mute-btn');
        let reelStarted = false;

        function startReel() {
            if (reelStarted || !reelVideo) return;
            reelStarted = true;
            reelVideo.play().catch(() => {});
            document.removeEventListener('touchstart', startReel);
            document.removeEventListener('click', startReel);
        }

        document.addEventListener('touchstart', startReel, { passive: true });
        document.addEventListener('click', startReel);

        if (reelMuteBtn && reelVideo) {
            reelMuteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                reelVideo.muted = !reelVideo.muted;
                reelMuteBtn.classList.toggle('reel-unmuted', !reelVideo.muted);
                reelMuteBtn.setAttribute('aria-label', reelVideo.muted ? 'Activar sonido' : 'Silenciar');
            });
        }

        // ── Followers count-up ──
        function countUp(el, target, suffix, duration) {
            const start = performance.now();
            const run = (now) => {
                const pct = Math.min((now - start) / duration, 1);
                const ease = 1 - Math.pow(1 - pct, 3);
                el.textContent = Math.round(ease * target / 1000) + suffix;
                if (pct < 1) requestAnimationFrame(run);
            };
            requestAnimationFrame(run);
        }
        const countEl = document.querySelector('.followers-count');
        if (countEl) countUp(countEl, 60000, 'K', 1400);
    </script>
